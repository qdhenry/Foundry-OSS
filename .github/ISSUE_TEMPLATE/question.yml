name: Question
description: Ask a question about Foundry
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        **Before opening an issue**, please check if your question has already been answered:
        - [Documentation](https://docs.foundryworks.com)
        - [GitHub Discussions](https://github.com/qdhenry/Foundry-OSS/discussions)

        For general questions, **GitHub Discussions** is preferred over issues.

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to do? What have you already tried?
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you need help with?
    validations:
      required: true
